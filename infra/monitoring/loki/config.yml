
# STEP 4 — CREATE LOKI CONFIG
# infra/monitoring/loki/config.yml


auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki

storage_config:
  filesystem:
    directory: /loki/chunks

schema_config:
  configs:
    - from: 2025-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h

compactor:
  working_directory: /loki/compactor