auth_enabled: false

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  chunk_encoding: snappy
  chunk_size_target: 1048576
  
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    num_tokens: 128
    heartbeat_timeout: 5m

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 100
  ingestion_burst_size_mb: 150
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 24h
  
schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

server:
  http_listen_port: 3100
  log_level: info

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

chunk_store_config:
  max_look_back_period: 0s
  default_time_from_past: 24h

table_manager:
  retention_deletes_enabled: false
  retention_period: 0s

query_range:
  align_queries_with_step: true
  max_cache_freshness_per_query: 10m
  cache_results: true
  results_cache:
    cache:
      enable_fifocache: true
      default_validity: 10m
      background:
        writeback_goroutines: 10
        writeback_delay: 5s
      memcached_client:
        consistent_hash: true
        max_idle_conns: 100
        update_interval: 1m
        addresses: memcached:11211

distributor:
  ring:
    kvstore:
      store: inmemory
  rate_limit_enabled: true
  rate_limit: 10MB
  rate_limit_burst: 15MB

# ============================================================================
# RUNTIME CONFIGURATION
# ============================================================================
# This section can be updated at runtime without restarting Loki
# Configure via /loki/api/prom/rules endpoint

