user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ====================================================================
    # LOGGING
    # ====================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format json_combined escape=json
    '{'
      '"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"remote_user":"$remote_user",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"request_time":"$request_time",'
      '"upstream_response_time":"$upstream_response_time",'
      '"http_x_forwarded_for":"$http_x_forwarded_for"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # ====================================================================
    # PERFORMANCE
    # ====================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ====================================================================
    # GZIP COMPRESSION
    # ====================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # ====================================================================
    # RATE LIMITING
    # ====================================================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ====================================================================
    # UPSTREAM SERVICES
    # ====================================================================
    upstream auth_service {
        server auth-service:8080;
        keepalive 32;
    }

    upstream user_service {
        server user-service:8080;
        keepalive 32;
    }

    upstream ride_service {
        server ride-service:8080;
        keepalive 32;
    }

    upstream dispatch_service {
        server dispatch-service:8080;
        keepalive 32;
    }

    upstream gps_service {
        server gps-service:8080;
        keepalive 32;
    }

    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    upstream websocket_gateway {
        server websocket-gateway:8080;
        keepalive 32;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream jaeger {
        server jaeger:16686;
    }

    # ====================================================================
    # REDIRECT HTTP TO HTTPS (in production)
    # ====================================================================
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ====================================================================
    # HTTP SERVER
    # ====================================================================
    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # ================================================================
        # HEALTH CHECK
        # ================================================================
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location /metrics {
            access_log off;
            return 404;
        }

        # ================================================================
        # API ROUTES
        # ================================================================

        # Auth Service
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_conn addr 10;

            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # User Service
        location ~ ^/api/v1/users/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://user_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Ride Service
        location ~ ^/api/v1/rides/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://ride_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Dispatch Service
        location ~ ^/api/v1/dispatch/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://dispatch_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # GPS Service
        location ~ ^/api/v1/gps/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://gps_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket Gateway
        location /ws {
            proxy_pass http://websocket_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ================================================================
        # MONITORING & OBSERVABILITY
        # ================================================================

        # Prometheus
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Jaeger
        location /jaeger/ {
            proxy_pass http://jaeger/;
            proxy_set_header Host $host;
        }

        # ================================================================
        # API DOCUMENTATION
        # ================================================================
        location /api/docs {
            return 301 https://swagger.io;
        }

        # ================================================================
        # STATIC FILES
        # ================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ================================================================
        # DEFAULT
        # ================================================================
        location / {
            try_files $uri $uri/ =404;
        }

        # ================================================================
        # SECURITY HEADERS
        # ================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    }

    # ====================================================================
    # INCLUDE ADDITIONAL CONFIGURATIONS
    # ====================================================================
    include /etc/nginx/conf.d/*.conf;
}
