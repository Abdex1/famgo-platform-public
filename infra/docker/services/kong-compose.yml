
# PHASE 3 — ENTERPRISE KONG DOCKER SETUP

---

# STEP 2 — CREATE KONG COMPOSE


# infra/docker/services/kong-compose.yml

services:

  kong-db:
    image: postgres:17

    container_name: famgo-kong-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kongpassword
      POSTGRES_DB: kong

    ports:
      - "5436:5432"

    volumes:
      - kong-db-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:3.8

    command: kong migrations bootstrap

    depends_on:
      kong-db:
        condition: service_healthy

    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpassword
      KONG_PG_DATABASE: kong

  kong:
    image: kong:3.8

    container_name: famgo-kong

    restart: unless-stopped

    depends_on:
      kong-db:
        condition: service_healthy

    environment:
      KONG_DATABASE: postgres

      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpassword
      KONG_PG_DATABASE: kong

      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout

      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr

      KONG_ADMIN_LISTEN: 0.0.0.0:8001

      KONG_TRACING_INSTRUMENTATIONS: all

      KONG_PLUGINS: bundled

    ports:
      - "8000:8000"
      - "8443:8443"

      - "8001:8001"
      - "8444:8444"

    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  kong-db-data: