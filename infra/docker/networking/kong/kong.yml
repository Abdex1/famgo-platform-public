
# PHASE 3 — KONG JWT INTEGRATION

# =========================================================

# STEP 9 — CREATE KONG DECLARATIVE CONFIG

# infra/docker/kong/kong.yml

_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:8080

    routes:
      - name: auth-route
        paths:
          - /api/v1/auth

plugins:
  - name: cors

  - name: rate-limiting
    config:
      minute: 100

  - name: prometheus

  - name: request-transformer