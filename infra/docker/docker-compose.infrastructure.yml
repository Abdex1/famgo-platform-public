
# STEP 6 — UPDATE INFRA DOCKER COMPOSE

# infra/docker/docker-compose.infrastructure.yml
services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: famgo-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../../monitoring/otel-collector/config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: famgo-prometheus
    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: famgo-grafana
    ports:
      - "3001:3000"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - jaeger
      - loki

  loki:
    image: grafana/loki:latest
    container_name: famgo-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ../../monitoring/loki/config.yml:/etc/loki/config.yml

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: famgo-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
  auth-service:
  build:
    context: ../../services/auth-service

  environment:
    DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_db
    REDIS_ADDR: redis:6379
    KAFKA_BROKERS: redpanda:9092

  depends_on:
    - postgres
    - redis
    - redpanda

  ports:
    - "8080:8080"