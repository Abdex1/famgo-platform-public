
# PHASE 5 — KUBERNETES MANIFESTS

# =========================================================

# STEP 16 — CREATE AUTH DEPLOYMENT

# infra/kubernetes/base/auth-service/deployment.yaml

apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth-service

          image: famgo/auth-service:latest

          ports:
            - containerPort: 8080

          env:
            - name: REDIS_ADDR
              value: redis:6379

            - name: KAFKA_BROKERS
              value: redpanda:9092