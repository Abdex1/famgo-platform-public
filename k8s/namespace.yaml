apiVersion: v1
kind: Namespace
metadata:
  name: famgo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: famgo-config
  namespace: famgo
data:
  kafka-brokers: "kafka-broker-0.kafka-broker.default.svc.cluster.local:9092"
  redis-url: "redis://redis:6379"
  jaeger-endpoint: "http://jaeger:14268/api/traces"

---
apiVersion: v1
kind: Secret
metadata:
  name: famgo-secrets
  namespace: famgo
type: Opaque
stringData:
  database-url: "postgresql://famgo:password@postgres:5432/famgo_platform"
  jwt-secret: "your-jwt-secret-key-here"
  api-key: "your-api-key-here"

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: famgo-pdb
  namespace: famgo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: famgo-service
