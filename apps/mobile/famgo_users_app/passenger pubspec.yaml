name: famgo_passenger_app
description: FamGo Passenger Application

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: 6.5.0
  firebase_database: ^12.4.2
  firebase_storage: ^13.4.2

  # Maps & Location
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2
  flutter_polyline_points: ^2.0.1
  flutter_geofire: ^2.0.5

  # State Management
  provider: ^6.1.5

  # Networking
  http: ^1.5.0
  connectivity_plus: ^7.1.1

  # Authentication
  google_sign_in: ^ 6.2.1

  # Permissions
  permission_handler: ^12.0.1
  
  # App Information (with built-in Kotlin support)
  package_info_plus: ^10.0.1

  # Payments
  flutter_stripe: 13.0.0

  # UI
  loading_animation_widget: ^1.3.0
  #rounded_loading_button: ^2.1.0  # UPDATED: Compatible with Material 3, fixes onSurface parameter
  pinput: ^6.0.2
  country_picker: ^2.0.27
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Utilities
  restart_app: ^1.4.0  # UPDATED: Built-in Kotlin support
  url_launcher: ^6.3.2

  # Google APIs
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/vehicles/
    - themes/

