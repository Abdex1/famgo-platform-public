syntax = "proto3";

package gps;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/FamGo/platform/services/gps-service/proto/gps";

service GPSService {
  rpc UpdateLocation(UpdateLocationRequest) returns (UpdateLocationResponse);
  rpc FindNearbyDrivers(FindNearbyDriversRequest) returns (FindNearbyDriversResponse);
  rpc GetDriverLocation(GetDriverLocationRequest) returns (GetDriverLocationResponse);
  rpc UpdateDriverStatus(UpdateDriverStatusRequest) returns (google.protobuf.Empty);
  rpc BulkUpdateLocations(BulkUpdateLocationsRequest) returns (BulkUpdateLocationsResponse);
  rpc GetOnlineDriversCount(google.protobuf.Empty) returns (GetOnlineDriversCountResponse);
}

message UpdateLocationRequest {
  string driver_id = 1;
  double latitude = 2;
  double longitude = 3;
  double altitude = 4;
  double accuracy = 5;
  double speed = 6;
  double heading = 7;
  int64 timestamp = 8;
}

message UpdateLocationResponse {
  bool success = 1;
  string driver_id = 2;
  double distance = 3;
  double eta_minutes = 4;
  string quality_issues = 5;
  int32 consecutive_fails = 6;
}

message FindNearbyDriversRequest {
  double latitude = 1;
  double longitude = 2;
  double radius_km = 3;
  int32 limit = 4;
  double base_speed_kmh = 5;
  bool only_online = 6;
}

message NearbyDriver {
  string driver_id = 1;
  double distance = 2;
  double eta_minutes = 3;
  double bearing = 4;
  double latitude = 5;
  double longitude = 6;
  bool is_online = 7;
  double acceptance_rate = 8;
  double rating = 9;
  int32 rides_completed = 10;
}

message FindNearbyDriversResponse {
  repeated NearbyDriver drivers = 1;
  int32 total = 2;
}

message GetDriverLocationRequest {
  string driver_id = 1;
}

message GetDriverLocationResponse {
  string driver_id = 1;
  double latitude = 2;
  double longitude = 3;
  double altitude = 4;
  double accuracy = 5;
  double speed = 6;
  double heading = 7;
  string status = 8;
  bool is_online = 9;
  google.protobuf.Timestamp last_update_at = 10;
  double acceptance_rate = 11;
  double rating = 12;
  int32 rides_completed = 13;
}

message UpdateDriverStatusRequest {
  string driver_id = 1;
  string status = 2;
}

message LocationUpdate {
  string driver_id = 1;
  double latitude = 2;
  double longitude = 3;
  double altitude = 4;
  double accuracy = 5;
  double speed = 6;
  double heading = 7;
  int64 timestamp = 8;
}

message BulkUpdateLocationsRequest {
  repeated LocationUpdate locations = 1;
}

message BulkUpdateLocationsResponse {
  int32 processed = 1;
  int32 failed = 2;
  repeated string failed_drivers = 3;
}

message GetOnlineDriversCountResponse {
  int64 count = 1;
}
