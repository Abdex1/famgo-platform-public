syntax = "proto3";

package dispatch.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/Abdex1/FamGo-platform/services/dispatch-service/api/proto/v1;dispatchv1";

// Dispatch Service gRPC API — ride matching lifecycle (canonical v1).
service DispatchService {
  rpc MatchRide(MatchRideRequest) returns (MatchRideResponse);
  rpc GetMatches(GetMatchesRequest) returns (GetMatchesResponse);
  rpc AcceptMatch(AcceptMatchRequest) returns (google.protobuf.Empty);
  rpc RejectMatch(RejectMatchRequest) returns (google.protobuf.Empty);
  rpc CancelDispatch(CancelDispatchRequest) returns (google.protobuf.Empty);
  rpc GetDispatchStats(GetStatsRequest) returns (GetStatsResponse);

  // Driver discovery / assignment helpers (from legacy api/proto draft).
  rpc RequestDrivers(RequestDriversRequest) returns (RequestDriversResponse);
  rpc GetNearbyDrivers(GetNearbyDriversRequest) returns (GetNearbyDriversResponse);
  rpc AssignDriver(AssignDriverRequest) returns (AssignDriverResponse);
  rpc CancelAssignment(CancelAssignmentRequest) returns (CancelAssignmentResponse);
}

message MatchRideRequest {
  string ride_id = 1;
  string rider_id = 2;
  double pickup_latitude = 3;
  double pickup_longitude = 4;
  double dropoff_latitude = 5;
  double dropoff_longitude = 6;
  double search_radius_km = 7;
  double max_search_radius_km = 8;
}

message MatchRideResponse {
  string dispatch_request_id = 1;
  string matched_driver_id = 2;
  repeated string proposed_drivers = 3;
  string status = 4;
  google.protobuf.Timestamp matched_at = 5;
}

message GetMatchesRequest {
  string dispatch_request_id = 1;
}

message GetMatchesResponse {
  string dispatch_request_id = 1;
  string status = 2;
  string matched_driver_id = 3;
  repeated string proposed_drivers = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message AcceptMatchRequest {
  string dispatch_request_id = 1;
  string driver_id = 2;
}

message RejectMatchRequest {
  string dispatch_request_id = 1;
  string reason = 2;
  bool can_retry = 3;
}

message CancelDispatchRequest {
  string dispatch_request_id = 1;
}

message GetStatsRequest {
  google.protobuf.Timestamp start_date = 1;
  google.protobuf.Timestamp end_date = 2;
}

message GetStatsResponse {
  int32 total_matches = 1;
  int32 successful_matches = 2;
  int32 failed_matches = 3;
  double success_rate = 4;
  double average_time_to_match = 5;
}

message DriverCandidate {
  string driver_id = 1;
  double latitude = 2;
  double longitude = 3;
  float distance_km = 4;
  float estimated_arrival_time = 5;
  float rating = 6;
  int32 completed_rides = 7;
}

message RequestDriversRequest {
  string ride_id = 1;
  double pickup_lat = 2;
  double pickup_lon = 3;
  double dropoff_lat = 4;
  double dropoff_lon = 5;
  string preferred_vehicle_type = 6;
  int32 required_drivers = 7;
}

message RequestDriversResponse {
  repeated DriverCandidate drivers = 1;
  int32 total_available = 2;
}

message GetNearbyDriversRequest {
  double latitude = 1;
  double longitude = 2;
  float radius_km = 3;
  string vehicle_type = 4;
}

message GetNearbyDriversResponse {
  repeated DriverCandidate drivers = 1;
}

message AssignDriverRequest {
  string ride_id = 1;
  string driver_id = 2;
}

message AssignDriverResponse {
  bool success = 1;
  string message = 2;
}

message CancelAssignmentRequest {
  string ride_id = 1;
  string reason = 2;
}

message CancelAssignmentResponse {
  bool success = 1;
  string message = 2;
}
