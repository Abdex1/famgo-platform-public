syntax = "proto3";

package ride.v1;

option go_package = "github.com/Abdex1/FamGo-platform/services/ride-service/api/proto/ride";

import "google/protobuf/timestamp.proto";

// Ride Service gRPC API
service RideService {
  // Create a new ride request
  rpc CreateRide(CreateRideRequest) returns (CreateRideResponse);
  
  // Get ride details
  rpc GetRide(GetRideRequest) returns (RideResponse);
  
  // Get rides by passenger
  rpc GetPassengerRides(GetPassengerRidesRequest) returns (GetPassengerRidesResponse);
  
  // Get rides by driver
  rpc GetDriverRides(GetDriverRidesRequest) returns (GetDriverRidesResponse);
  
  // Assign driver to ride
  rpc AssignDriver(AssignDriverRequest) returns (AssignDriverResponse);
  
  // Start ride (pickup complete)
  rpc StartRide(StartRideRequest) returns (StartRideResponse);
  
  // Complete ride (dropoff complete)
  rpc CompleteRide(CompleteRideRequest) returns (CompleteRideResponse);
  
  // Cancel ride
  rpc CancelRide(CancelRideRequest) returns (CancelRideResponse);
}

// Request/Response Messages

message CreateRideRequest {
  string passenger_id = 1;
  double pickup_lat = 2;
  double pickup_lon = 3;
  double dropoff_lat = 4;
  double dropoff_lon = 5;
}

message CreateRideResponse {
  string ride_id = 1;
  string status = 2;
}

message GetRideRequest {
  string ride_id = 1;
}

message RideResponse {
  string id = 1;
  string passenger_id = 2;
  string driver_id = 3;
  double pickup_lat = 4;
  double pickup_lon = 5;
  double dropoff_lat = 6;
  double dropoff_lon = 7;
  string status = 8;
  float estimated_fare = 9;
  float actual_fare = 10;
  google.protobuf.Timestamp pickup_time = 11;
  google.protobuf.Timestamp dropoff_time = 12;
  string cancellation_reason = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message GetPassengerRidesRequest {
  string passenger_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetPassengerRidesResponse {
  repeated RideResponse rides = 1;
  int32 total = 2;
}

message GetDriverRidesRequest {
  string driver_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetDriverRidesResponse {
  repeated RideResponse rides = 1;
  int32 total = 2;
}

message AssignDriverRequest {
  string ride_id = 1;
  string driver_id = 2;
}

message AssignDriverResponse {
  bool success = 1;
}

message StartRideRequest {
  string ride_id = 1;
}

message StartRideResponse {
  bool success = 1;
}

message CompleteRideRequest {
  string ride_id = 1;
  float actual_fare = 2;
}

message CompleteRideResponse {
  bool success = 1;
}

message CancelRideRequest {
  string ride_id = 1;
  string reason = 2;
}

message CancelRideResponse {
  bool success = 1;
}
