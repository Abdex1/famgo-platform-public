# STEP 4 — CREATE KONG DECLARATIVE CONFIG


# gateway/kong/declarative/kong.yml

_format_version: "3.0"

services:

  - name: auth-service

    url: http://host.docker.internal:8081

    routes:
      - name: auth-route
        paths:
          - /api/v1/auth

  - name: user-service

    url: http://host.docker.internal:8082

    routes:
      - name: user-route
        paths:
          - /api/v1/users

  - name: ride-service

    url: http://host.docker.internal:8083

    routes:
      - name: ride-route
        paths:
          - /api/v1/rides