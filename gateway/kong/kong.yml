// gateway/kong/kong.yml
_format_version: "2.1"
_transform: true

services:
  - name: ride-service
    protocol: http
    host: ride-service
    port: 8080
    routes:
      - name: get-ride
        protocols: [http, https]
        methods: [GET]
        paths: [/v1/rides/{ride_id}]
        strip_path: false
        plugins:
          - name: jwt
          - name: rate-limiting
            config:
              minute: 100
      - name: create-ride
        protocols: [http, https]
        methods: [POST]
        paths: [/v1/rides]
        strip_path: false
        plugins:
          - name: jwt
          - name: rate-limiting
            config:
              minute: 50

  - name: driver-service
    protocol: http
    host: driver-service
    port: 8080
    routes:
      - name: get-drivers
        protocols: [http, https]
        methods: [GET]
        paths: [/v1/drivers/{driver_id}]
        strip_path: false
        plugins:
          - name: jwt

  - name: payment-service
    protocol: http
    host: payment-service
    port: 8080
    routes:
      - name: process-payment
        protocols: [http, https]
        methods: [POST]
        paths: [/v1/payments]
        strip_path: false
        plugins:
          - name: jwt
          - name: rate-limiting
            config:
              minute: 50

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Content-Language
        - Content-Type
        - Authorization
      expose_headers:
        - Content-Type
        - X-Request-ID
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 1000
      hour: 10000
      policy: redis
      redis:
        host: redis
        port: 6379

  - name: jwt
    config:
      key_claim_name: iss
      secret_is_base64: false
